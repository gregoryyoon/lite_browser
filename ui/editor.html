<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Markdown Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- TOAST UI Editor CSS -->
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #editor-container {
      height: 100vh;
      width: 100vw;
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
    }
    /* Customize TOAST UI Editor style to fit nicely with our premium layout */
    .toastui-editor-defaultUI {
      border: none !important;
    }
    /* Float the mode switch bar above the floating card to prevent click interception */
    .toastui-editor-mode-switch {
      bottom: 80px !important;
      right: 20px !important;
      left: auto !important;
      width: auto !important;
      background: rgba(255, 255, 255, 0.9) !important;
      border: 1px solid rgba(0, 0, 0, 0.1) !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05) !important;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    /* Add extra padding at the bottom of the editor pane so the floating card doesn't cover text */
    .toastui-editor-main-container {
      padding-bottom: 80px;
    }
    .floating-card {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100000;
      display: none; /* Hidden by default */
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 10px 16px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .floating-card.visible {
      display: flex;
    }
    .floating-card:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(99, 102, 241, 0.3);
    }
    .input-field {
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      width: 130px;
      background: white;
      transition: border-color 0.15s ease;
    }
    .input-field:focus {
      border-color: #6366f1;
    }
    .select-field {
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      width: 150px;
      background: white;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .select-field:focus {
      border-color: #6366f1;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      opacity: 0;
      z-index: 100001;
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="editor-container"></div>

  <div class="floating-card">
    <button class="btn btn-secondary" onclick="newFile()">새 파일</button>
    <input type="text" id="filename-input" class="input-field" placeholder="파일명.md" value="untitled.md">
    <button class="btn btn-primary" onclick="saveFile()">저장</button>
    <select id="file-select" class="select-field" onfocus="refreshFileList()" onchange="onFileSelected(this.value)">
      <option value="">-- 파일 불러오기 --</option>
    </select>
    <button class="btn btn-primary" onclick="sendPrompt()" style="background: linear-gradient(135deg, #10b981, #059669);">프롬프트 입력</button>
  </div>
  <div id="toast" class="toast">저장 완료</div>

  <!-- TOAST UI Editor JS -->
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script>
    // Global error logger to capture any JS errors in backend logs
    window.onerror = function(message, source, lineno, colno, error) {
      const errStr = `[JS Error] ${message} at ${source}:${lineno}:${colno}`;
      window.location.href = 'http://ui-action/log?msg=' + encodeURIComponent(errStr);
      return false;
    };
    window.onunhandledrejection = function(event) {
      const errStr = `[JS Unhandled Rejection] ${event.reason}`;
      window.location.href = 'http://ui-action/log?msg=' + encodeURIComponent(errStr);
    };

    // Prevent any browser scroll-into-view jumps when editor elements are focused
    window.addEventListener('scroll', () => {
      window.scrollTo(0, 0);
    });
    document.addEventListener('scroll', () => {
      window.scrollTo(0, 0);
    });

    let editor;
    const DEFAULT_TEMPLATE = `# [역할 정의] 당신은 전문 [직업/역할]입니다.

## 1. 개요 (Context)
- 목적: 이 작업을 수행하는 이유와 배경을 설명합니다.
- 대상: 이 결과물을 소비할 대상(예: 개발자, 일반 대중, 경영진)을 명시합니다.

## 2. 작업 지시 (Instructions)
수행해야 할 구체적인 단계를 순서대로 작성합니다.
1. [첫 번째 단계]
2. [두 번째 단계]
3. [세 번째 단계]

## 3. 제약 조건 및 규칙 (Constraints)
- 조건 1: 반드시 지켜야 할 규칙 (예: "톤앤매너는 전문적이고 객관적으로")
- 조건 2: 제외해야 할 사항 (예: "전문 용어는 지양하고 쉬운 단어로")
- 조건 3: 분량 제한 (예: "3문장 이내로 요약")

## 4. 입력 데이터 (Input Data)
<input_data>
[여기에 분석하거나 처리할 원본 텍스트, 코드, 데이터 등을 입력하세요]
</input_data>

## 5. 출력 형식 (Output Format)
반드시 아래 형식을 엄격히 준수하여 답변해 주세요.

### [출력 제목]
- **요약:**
- **주요 내용:**
  * 핵심 1
  * 핵심 2
- **결론 및 제언:**`;

    let currentContent = DEFAULT_TEMPLATE;

    function createCustomButton() {
      const button = document.createElement('button');
      button.className = 'toastui-editor-toolbar-icons';
      button.style.backgroundImage = 'none';
      button.style.margin = '0';
      button.style.display = 'flex';
      button.style.alignItems = 'center';
      button.style.justifyContent = 'center';
      button.style.border = 'none';
      button.style.background = 'none';
      button.style.cursor = 'pointer';
      button.style.width = '32px';
      button.style.height = '32px';
      // Folder icon for file/document management control panel toggle
      button.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-folder" style="color: #475569;"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`;
      
      button.addEventListener('click', () => {
        const card = document.querySelector('.floating-card');
        card.classList.toggle('visible');
      });
      return button;
    }

    window.onload = function() {
      // Initialize TOAST UI Editor
      editor = new toastui.Editor({
        el: document.querySelector('#editor-container'),
        height: '100%',
        initialEditType: 'wysiwyg', // Default to WYSIWYG mode
        previewStyle: 'vertical',
        initialValue: currentContent,
        toolbarItems: [
          [
            {
              name: 'controlToggle',
              tooltip: '파일 관리',
              el: createCustomButton()
            }
          ],
          ['heading', 'bold', 'italic', 'strike'],
          ['hr', 'quote'],
          ['ul', 'ol', 'task', 'indent', 'outdent'],
          ['table', 'image', 'link'],
          ['code', 'codeblock']
        ]
      });

      // Synchronize editor changes back to currentContent variable
      editor.on('change', () => {
        currentContent = editor.getMarkdown();
      });

      refreshFileList();
    };

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    function newFile() {
      document.getElementById('filename-input').value = 'untitled.md';
      currentContent = DEFAULT_TEMPLATE;
      editor.setMarkdown(currentContent);
      showToast('새 파일이 생성되었습니다.');
    }

    function saveFile() {
      const filename = document.getElementById('filename-input').value.trim();
      if (!filename) {
        showToast('파일명을 입력해주세요.');
        return;
      }
      
      const bytes = new TextEncoder().encode(currentContent);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      const base64Content = btoa(binary);

      window.location.href = 'http://ui-action/editor-save-file?name=' + encodeURIComponent(filename) + '&content=' + encodeURIComponent(base64Content);
    }

    window.onFileSaved = function(success, name) {
      if (success) {
        showToast('성공적으로 저장되었습니다: ' + name);
        refreshFileList();
      } else {
        showToast('저장에 실패했습니다.');
      }
    };

    function refreshFileList() {
      window.location.href = 'http://ui-action/editor-list-files';
    }

    window.onFilesListed = function(files) {
      const select = document.getElementById('file-select');
      const currentValue = select.value;
      
      select.innerHTML = '<option value="">-- 파일 불러오기 --</option>';
      
      files.forEach(file => {
        const opt = document.createElement('option');
        opt.value = file;
        opt.innerText = file;
        select.appendChild(opt);
      });
      
      if (files.includes(currentValue)) {
        select.value = currentValue;
      }
    };

    function onFileSelected(filename) {
      if (!filename) return;
      window.location.href = 'http://ui-action/editor-load-file?name=' + encodeURIComponent(filename);
    }

    window.onFileLoaded = function(name, base64Content) {
      document.getElementById('filename-input').value = name;
      
      const binaryString = atob(base64Content);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      currentContent = new TextDecoder().decode(bytes);
      
      editor.setMarkdown(currentContent);
      showToast('파일을 불러왔습니다: ' + name);
      document.getElementById('file-select').value = '';
    };

    function sendPrompt() {
      const bytes = new TextEncoder().encode(currentContent);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      const base64Content = btoa(binary);
      
      window.location.href = 'http://ui-action/send-prompt?text=' + encodeURIComponent(base64Content);
      showToast('프롬프트를 전송했습니다.');
    }
  </script>
</body>
</html>
