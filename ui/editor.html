<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Markdown Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      overflow: hidden;
      height: 100vh;
    }
    .floating-card {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100000;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 10px 16px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .floating-card:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(99, 102, 241, 0.3);
    }
    .input-field {
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      width: 130px;
      background: white;
      transition: border-color 0.15s ease;
    }
    .input-field:focus {
      border-color: #6366f1;
    }
    .select-field {
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      width: 150px;
      background: white;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .select-field:focus {
      border-color: #6366f1;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      opacity: 0;
      z-index: 100001;
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="floating-card">
    <button class="btn btn-secondary" onclick="newFile()">새 파일</button>
    <input type="text" id="filename-input" class="input-field" placeholder="파일명.md" value="untitled.md">
    <button class="btn btn-primary" onclick="saveFile()">저장</button>
    <select id="file-select" class="select-field" onfocus="refreshFileList()" onchange="onFileSelected(this.value)">
      <option value="">-- 파일 불러오기 --</option>
    </select>
    <button class="btn btn-primary" onclick="sendPrompt()" style="background: linear-gradient(135deg, #10b981, #059669);">프롬프트 입력</button>
  </div>
  <div id="toast" class="toast">저장 완료</div>

  <script src="https://unpkg.com/stackedit-js@1.0.7/docs/lib/stackedit.min.js"></script>
  <script>
    let stackedit;
    const DEFAULT_TEMPLATE = `# [역할 정의] 당신은 전문 [직업/역할]입니다.

## 1. 개요 (Context)
- 목적: 이 작업을 수행하는 이유와 배경을 설명합니다.
- 대상: 이 결과물을 소비할 대상(예: 개발자, 일반 대중, 경영진)을 명시합니다.

## 2. 작업 지시 (Instructions)
수행해야 할 구체적인 단계를 순서대로 작성합니다.
1. [첫 번째 단계]
2. [두 번째 단계]
3. [세 번째 단계]

## 3. 제약 조건 및 규칙 (Constraints)
- 조건 1: 반드시 지켜야 할 규칙 (예: "톤앤매너는 전문적이고 객관적으로")
- 조건 2: 제외해야 할 사항 (예: "전문 용어는 지양하고 쉬운 단어로")
- 조건 3: 분량 제한 (예: "3문장 이내로 요약")

## 4. 입력 데이터 (Input Data)
<input_data>
[여기에 분석하거나 처리할 원본 텍스트, 코드, 데이터 등을 입력하세요]
</input_data>

## 5. 출력 형식 (Output Format)
반드시 아래 형식을 엄격히 준수하여 답변해 주세요.

### [출력 제목]
- **요약:**
- **주요 내용:**
  * 핵심 1
  * 핵심 2
- **결론 및 제언:**`;

    let currentContent = DEFAULT_TEMPLATE;

    window.onload = function() {
      stackedit = new Stackedit();
      
      stackedit.on('fileChange', (file) => {
        currentContent = file.content.text;
      });
      
      stackedit.on('close', () => {
        openStackEdit();
      });

      openStackEdit();
      refreshFileList();
    };

    function openStackEdit() {
      stackedit.openFile({
        name: document.getElementById('filename-input').value,
        content: {
          text: currentContent
        }
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    function newFile() {
      document.getElementById('filename-input').value = 'untitled.md';
      currentContent = DEFAULT_TEMPLATE;
      stackedit.close();
      showToast('새 파일이 생성되었습니다.');
    }

    function saveFile() {
      const filename = document.getElementById('filename-input').value.trim();
      if (!filename) {
        showToast('파일명을 입력해주세요.');
        return;
      }
      
      const bytes = new TextEncoder().encode(currentContent);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      const base64Content = btoa(binary);

      window.location.href = 'http://ui-action/editor-save-file?name=' + encodeURIComponent(filename) + '&content=' + encodeURIComponent(base64Content);
    }

    window.onFileSaved = function(success, name) {
      if (success) {
        showToast('성공적으로 저장되었습니다: ' + name);
        refreshFileList();
      } else {
        showToast('저장에 실패했습니다.');
      }
    };

    function refreshFileList() {
      window.location.href = 'http://ui-action/editor-list-files';
    }

    window.onFilesListed = function(files) {
      const select = document.getElementById('file-select');
      const currentValue = select.value;
      
      select.innerHTML = '<option value="">-- 파일 불러오기 --</option>';
      
      files.forEach(file => {
        const opt = document.createElement('option');
        opt.value = file;
        opt.innerText = file;
        select.appendChild(opt);
      });
      
      if (files.includes(currentValue)) {
        select.value = currentValue;
      }
    };

    function onFileSelected(filename) {
      if (!filename) return;
      window.location.href = 'http://ui-action/editor-load-file?name=' + encodeURIComponent(filename);
    }

    window.onFileLoaded = function(name, base64Content) {
      document.getElementById('filename-input').value = name;
      
      const binaryString = atob(base64Content);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      currentContent = new TextDecoder().decode(bytes);
      
      stackedit.close();
      showToast('파일을 불러왔습니다: ' + name);
      document.getElementById('file-select').value = '';
    };

    function sendPrompt() {
      const bytes = new TextEncoder().encode(currentContent);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      const base64Content = btoa(binary);
      
      window.location.href = 'http://ui-action/send-prompt?text=' + encodeURIComponent(base64Content);
      showToast('프롬프트를 전송했습니다.');
    }
  </script>
</body>
</html>
