<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lite Browser UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="browser-ui">
    <div class="tabs-bar">
      <div id="tabs" class="tabs-container"></div>
      <button class="tab-btn add-tab" onclick="newTab()" title="새 탭">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <div class="tabs-spacer"></div>
      <div class="window-controls">
        <button class="win-control-btn" onclick="minimizeWindow()" title="최소화">
          <svg viewBox="0 0 10.2 1"><rect x="0" y="0" width="10.2" height="1"/></svg>
        </button>
        <button id="win-max" class="win-control-btn" onclick="maximizeWindow()" title="최대화">
          <svg viewBox="0 0 10 10"><path d="M0,0v10h10V0H0z M9,9H1V1h8V9z"/></svg>
        </button>
        <button class="win-control-btn win-close-btn" onclick="closeWindow()" title="닫기">
          <svg viewBox="0 0 10 10"><path d="M10,0.9L9.1,0L5,4.1L0.9,0L0,0.9L4.1,5L0,9.1L0.9,10L5,5.9L9.1,10L10,9.1L5.9,5L10,0.9z"/></svg>
        </button>
      </div>
    </div>
    <div class="navbar">
    <div class="nav-buttons">
      <button id="back" class="nav-btn" onclick="goBack()" disabled title="뒤로 가기">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <button id="forward" class="nav-btn" onclick="goForward()" disabled title="앞으로 가기">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <button id="reload" class="nav-btn" onclick="reloadPage()" title="새로고침">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
    </div>
    
    <div class="address-container">
      <div class="ssl-icon">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      </div>
      <input type="text" id="address-bar" placeholder="검색어 또는 웹사이트 주소 입력" onkeydown="handleKey(event)">
      <div id="loader" class="loader hide"></div>
    </div>
    <button id="editor-toggle-btn" class="nav-btn" onclick="toggleEditor()" title="마크다운 에디터 토글">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
    </button>
    <div class="menu-container">
      <button id="menu-btn" class="nav-btn" onclick="toggleMenu(event)" title="메뉴">
        <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>
    </div>
  </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
